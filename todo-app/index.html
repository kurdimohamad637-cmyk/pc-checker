<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List App - Local Storage</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>📝 My Todo List</h1>
            <p>Stay organized and productive</p>
        </header>

        <div class="input-section">
            <div class="input-group">
                <input 
                    type="text" 
                    id="todoInput" 
                    class="input-field" 
                    placeholder="Add a new task..."
                    autocomplete="off"
                >
                <button class="add-btn" onclick="addTodo()">Add</button>
            </div>
            <div class="filter-buttons">
                <button class="filter-btn active" onclick="filterTodos('all')">All</button>
                <button class="filter-btn" onclick="filterTodos('active')">Active</button>
                <button class="filter-btn" onclick="filterTodos('completed')">Completed</button>
            </div>
        </div>

        <div class="stats">
            <div class="stat-item">
                <span class="stat-label">Total:</span>
                <span class="stat-value" id="totalCount">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Active:</span>
                <span class="stat-value" id="activeCount">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Completed:</span>
                <span class="stat-value" id="completedCount">0</span>
            </div>
        </div>

        <div class="todos-container">
            <ul class="todos-list" id="todosList">
                <!-- Todos will be added here -->
            </ul>
            <div class="empty-state" id="emptyState">
                <p>📭 No tasks yet. Add one to get started!</p>
            </div>
        </div>

        <div class="actions">
            <button class="action-btn clear-btn" onclick="clearCompleted()">Clear Completed</button>
            <button class="action-btn delete-all-btn" onclick="deleteAllTodos()">Delete All</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
